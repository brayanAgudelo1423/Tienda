# Render Blueprint — repo: brayanAgudelo1423/Tienda
# Dashboard: https://dashboard.render.com

databases:
  - name: ozono-db
    databaseName: ozono
    user: ozono
    plan: free

services:
  - type: web
    name: tienda
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ozono-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://brayanagudelo1423.github.io/Tienda
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        value: ozono2026
      - key: PAYU_TEST
        value: "1"
      - key: BACKEND_URL
        value: https://tienda-ur10.onrender.com
