# Render Blueprint — repo: brayanagudelo1423-png/OZONO
# Crear: https://dashboard.render.com → New → Blueprint

services:
  - type: web
    name: ozono
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci || npm install && npm run seed
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://brayanagudelo1423-png.github.io
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        value: ozono2026
