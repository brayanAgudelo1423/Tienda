services:
  - type: web
    name: ozono-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run seed && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: FRONTEND_URL
        value: https://brayanagudelo1423-png.github.io
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        value: ozono2026
