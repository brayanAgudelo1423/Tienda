# Render Blueprint — repo: brayanAgudelo1423/Tienda
# Crear: https://dashboard.render.com → New → Blueprint

services:
  - type: web
    name: ozono
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci || npm install && npm run seed && npm run seed:lociones
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://brayanagudelo1423.github.io/Tienda
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        value: ozono2026
      - key: PAYU_TEST
        value: "1"
      - key: BACKEND_URL
        value: https://tienda-ur10.onrender.com
