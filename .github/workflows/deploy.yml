name: Deploy to GitHub Pages

on:
  push:
    branches: [main, store]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        env:
          # En GitHub Pages necesitamos la URL pública de la API (Render)
          # Puedes sobrescribirla con un secret del repo: VITE_API_URL
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://tienda-ur10.onrender.com' }}
        run: |
          npm ci
          npm run build
          test -d dist/images
          echo "Imagenes en dist: $(find dist/images -type f | wc -l)"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
